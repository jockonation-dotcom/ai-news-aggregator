name: Daily AI News Aggregation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install feedparser pyyaml anthropic langdetect
      
      - name: Run news aggregator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python news_aggregator.py
      
      - name: Commit and push
        run: |
          git config --global user.name "News Bot"
          git config --global user.email "bot@example.com"
          git add docs/news_dashboard.html || true
          git commit -m "chore: update dashboard" || true
          git push || true
