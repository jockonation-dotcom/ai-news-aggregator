name: Daily AI News Aggregation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install feedparser pyyaml anthropic langdetect
      
      - name: Run news aggregator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python news_aggregator.py
      
      - name: Check if HTML exists
        run: |
          if [ -f docs/news_dashboard.html ]; then
            echo "✓ HTML file created successfully"
            ls -lh docs/news_dashboard.html
          else
            echo "✗ HTML file NOT created"
            exit 1
          fi
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/news_dashboard.html
          git commit -m "chore: update dashboard $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main
