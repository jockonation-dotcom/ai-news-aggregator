name: Daily AI News Aggregation

on:
  schedule:
    # 毎日 09:00 JST (00:00 UTC) に実行
    - cron: '0 0 * * *'
  # 手動実行も可能
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install feedparser pyyaml anthropic langdetect
      
      - name: Run news aggregator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python news_aggregator.py
      
- name: Commit and push
  run: |
    git config user.name "News Bot"
    git config user.email "bot@example.com"
    git add docs/news_dashboard.html
    git commit -m "chore: update news dashboard $(date '+%Y-%m-%d %H:%M')" || echo "No changes to commit"
    git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }} || echo "Push failed or no changes"
